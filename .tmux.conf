# Terminal capabilities (tmux 3.3+)
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB,Smulx,Setulc"

# Theme colors
%hidden THEME_STATUS_FG=#dadada
%hidden THEME_STATUS_BG=#ffffff
%hidden THEME_SESSION_FG=#ffffff
%hidden THEME_SESSION_BG=#ff0087
%hidden THEME_PREFIX_FG=#ffffff
%hidden THEME_PREFIX_BG=#3a3a3a
%hidden THEME_WINDOW_FG=#aaaaaa
%hidden THEME_WINDOW_ACTIVE_FG=#ffffff
%hidden THEME_WINDOW_CURRENT_FG=#ffffff
%hidden THEME_WINDOW_CURRENT_BG=#ff0087
%hidden THEME_WINDOW_STATUS_FG=#000000
%hidden THEME_WINDOW_STATUS_BG=${THEME_STATUS_BG}
%hidden THEME_RIGHT_FG=#dadada
%hidden THEME_RIGHT_BG=#3a3a3a
%hidden THEME_TIME_FG=#ffffff
%hidden THEME_TIME_BG=#ff0087
%hidden THEME_PANE_BORDER_FG=#878787
%hidden THEME_PANE_ACTIVE_BORDER_FG=#cc0077
%hidden THEME_MESSAGE_BG=#00cdcd
%hidden THEME_MESSAGE_FG=#00005f
%hidden THEME_POPUP_BG=#000000
%hidden THEME_POPUP_FG=#e8e8e8
%hidden THEME_POPUP_BORDER_FG=#ffffff
%hidden THEME_DISPLAY_PANES_ACTIVE=#0087ff
%hidden THEME_DISPLAY_PANES=#d75f00

# コピーモードでviのキーバインドを有効にする
setw -g mode-keys vi

# escの反応を早くする
set -s escape-time 0

# 1.9 changed the behaviour of split-window and new-window.
# I prefer the old style for split-window.
unbind %
bind-key % split-window -h -c "#{pane_current_path}"
unbind '"'
bind-key '"' split-window -v -c "#{pane_current_path}"

# paneの移動
bind-key -n S-left select-pane -L
bind-key -n S-down select-pane -D
bind-key -n S-up select-pane -U
bind-key -n S-right select-pane -R

# paneリサイズ
bind-key -r C-h resize-pane -L 5
bind-key -r C-j resize-pane -D 5
bind-key -r C-k resize-pane -U 5
bind-key -r C-l resize-pane -R 5

# パネル入れ替え
bind-key S-left  swap-pane -U  # 現在のペインを上と入れ替える
bind-key S-down  swap-pane -D  # 現在のペインを下と入れ替える
# bind-key S-up    swap-pane -L  # 現在のペインを左と入れ替え(tmux4から)
# bind-key S-right swap-pane -R  # 現在のペインを右と入れ替え(tmux4から)

# session/window
bind-key s choose-tree -sZ -O name
bind-key N command-prompt -p "new session name:" "new-session -s '%%'"

# パネル番号表示
bind-key C-g display-panes
set -g display-panes-time 10000

# マウスのスクロールを使えるようにする
set -g mouse on
bind-key -T root WheelUpPane   if-shell -F -t = "#{alternate_on}" "send-keys -M" "select-pane -t =; copy-mode -e; send-keys -M"
bind-key -T root WheelDownPane if-shell -F -t = "#{alternate_on}" "send-keys -M" "select-pane -t =; send-keys -M"

# Appearance
set -g status on
set -g status-interval 5
set -g status-left-length 48
set -g status-right-length 90
setw -g status-style "fg=$THEME_STATUS_FG,bg=$THEME_STATUS_BG"
set -g status-left "#[fg=$THEME_SESSION_FG,bg=$THEME_SESSION_BG,bold] #S #[fg=$THEME_SESSION_BG,bg=$THEME_STATUS_BG,nobold]#{?client_prefix,#[fg=$THEME_PREFIX_BG,bg=$THEME_STATUS_BG]#[fg=$THEME_PREFIX_FG,bg=$THEME_PREFIX_BG,bold] PREFIX #[fg=$THEME_PREFIX_BG,bg=$THEME_STATUS_BG,nobold],}"
set -g status-right "#[fg=$THEME_RIGHT_BG,bg=$THEME_STATUS_BG]#[fg=$THEME_RIGHT_FG,bg=$THEME_RIGHT_BG] pane #P #[fg=$THEME_RIGHT_FG,bg=$THEME_RIGHT_BG] #{=32:#{s|#{E:HOME}|~|:pane_current_path}} #[fg=$THEME_TIME_BG,bg=$THEME_RIGHT_BG]#[fg=$THEME_TIME_FG,bg=$THEME_TIME_BG,bold] %H:%M "
set -g window-style "fg=$THEME_WINDOW_FG"
set -g window-active-style "fg=$THEME_WINDOW_ACTIVE_FG"
set -g window-status-separator ""
setw -g window-status-style "fg=$THEME_WINDOW_STATUS_FG,bg=$THEME_WINDOW_STATUS_BG"
setw -g window-status-format " #I:#W "
setw -g window-status-current-style "fg=$THEME_WINDOW_CURRENT_FG,bg=$THEME_WINDOW_CURRENT_BG,bold"
setw -g window-status-current-format "#[fg=$THEME_WINDOW_CURRENT_BG,bg=$THEME_STATUS_BG]#[fg=$THEME_WINDOW_CURRENT_FG,bg=$THEME_WINDOW_CURRENT_BG,bold] #I:#W #[fg=$THEME_WINDOW_CURRENT_BG,bg=$THEME_STATUS_BG,nobold]"
set -g pane-border-style "fg=$THEME_PANE_BORDER_FG"
set -g pane-active-border-style "fg=$THEME_PANE_ACTIVE_BORDER_FG"
set -g pane-border-lines single
set -g message-style "bg=$THEME_MESSAGE_BG,fg=$THEME_MESSAGE_FG"
set -g popup-style "bg=$THEME_POPUP_BG,fg=$THEME_POPUP_FG"
set -g popup-border-style "bg=$THEME_POPUP_BG,fg=$THEME_POPUP_BORDER_FG"
set -g display-panes-active-colour "$THEME_DISPLAY_PANES_ACTIVE"
set -g display-panes-colour "$THEME_DISPLAY_PANES"

# TPM
unbind -T prefix I
bind-key -T prefix I run-shell "~/.tmux/plugins/tpm/bin/install_plugins"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# TPM を最後に実行
run '~/.tmux/plugins/tpm/tpm'
